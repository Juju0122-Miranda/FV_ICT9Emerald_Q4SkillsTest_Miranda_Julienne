<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Datatype:wght@100..900&display=swap" rel="stylesheet">

<title>Q4 Skillstest</title>

<style>
    body{
        background-image: url();
        background-repeat: no-repeat;
        background-size: cover;
    }
    h1{
        text-align: center;
        font-family: "Changa One", sans-serif;
        font-size: 50px;
    }
    #note {
        color: #6c757d; 
        font-style: italic;
        margin-top: 5px;
    }
    #message {
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>

<body>

<form>
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 shadow" style="width: 450px; border-radius: 25px;">
        
        <h1 class="mb-3">Login</h1>

        <!-- Username -->
        <label for="user_" class="form-label">Username</label>
        <input type="text" id="user_" class="form-control mb-3" placeholder="Input username">

        <!-- Password -->
        <label for="pass_" class="form-label">Password</label>
        <input type="password" id="pass_" class="form-control mb-3" placeholder="Input Password">

        <!-- Checkbox -->
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="staylog" onclick="messagepop()">
            <label class="form-check-label" for="staylog">Stay logged in</label>
        </div>

        <p id="note"></p>

        <div class="d-flex justify-content-between mt-3">
            <button id="logbtn" type="button" class="btn btn-primary w-50 me-2" onclick="verifier()">Login</button>
            <button class="btn btn-secondary w-50" type="reset">Cancel</button>
        </div>

        <div id="message" class="text-center mt-3"></div> 
        
        </div>
    </div>
</form>

<script>
    // Stay logged in message
    function messagepop() {
        let staylog = document.getElementById("staylog").checked;
        let note = document.getElementById("note");

        if (staylog) {
            note.textContent = "Your session will be saved on this device";
        } else {
            note.textContent = "";
        }
    }

    let attempt_counter = 0;

    function verifier() {
        let username = document.getElementById("user_").value;
        let pwd = document.getElementById("pass_").value;
        let granted = "You have successfully logged in. Welcome back, " + username + "!";
        let denied = "Login unsuccessful. Account locked after 3 attempts!";

        // Check if empty
        if (username === "" || pwd === "") {
            alert("Please fill out the form.");
            return;
        }

        // Correct credentials
        if (username === "Jujutm_0211" && pwd === "hp122_11") {
            alert(granted);
            attempt_counter = 0;
            document.getElementById("message").innerHTML = "";

            // redirect
            window.location.href = "notebook.html";
        } 
        else {
            attempt_counter++;

            document.getElementById("message").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";

            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("logbtn").disabled = true;
            }
        }
    }
</script>

</body>
</html>
